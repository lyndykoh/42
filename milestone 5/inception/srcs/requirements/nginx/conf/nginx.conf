server {
    # Listen on port 443 for IPv4 and IPv6
    listen 443 ssl;
    listen [::]:443 ssl;
    
    # Your domain name
    server_name lkoh.42.fr;

    # SSL Certificate locations (generated by the setup script)
    ssl_certificate /etc/nginx/ssl/inception.crt;
    ssl_certificate_key /etc/nginx/ssl/inception.key;

    # Enforce TLSv1.2 and TLSv1.3 only
    ssl_protocols TLSv1.2 TLSv1.3;

    # Website root directory and index files
    root /var/www/html;
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }

    # Pass PHP scripts to the WordPress container's PHP-FPM via port 9000
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass wordpress:9000;
    }
}